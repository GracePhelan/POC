<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            line-height: 1.6;
            color: #333;
        }

        h2 {
            color: #0078d4;
        }

        .button {
            padding: 12px 22px;
            background-color: #0078d4;
            color: #fff;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
        }

        #captcha-container {
            margin-top: 25px;
            display: none;
        }

        #form-container {
            margin-top: 30px;
            display: none;
        }

        iframe {
            width: 100%;
            height: 1200px;
            border: none;
        }
    </style>
</head>
<body>

<h2>Expression of Interest – Verification</h2>

<p>
    Before accessing the Expression of Interest form, please verify that you are human.
</p>

<button class="button" onclick="showCaptcha()">Continue</button>

<div id="captcha-container"></div>

<div id="form-container">
    <iframe id="ms-form"></iframe>
</div>

<script>
function showCaptcha() {
    const captcha = document.getElementById("captcha-container");
    captcha.style.display = "block";

    turnstile.render("#captcha-container", {
        sitekey: "0x4AAAAAACyjYuS7nzfVfYYa",
        callback: onCaptchaPassed
    });
}

function onCaptchaPassed(token) {
    const params = new URLSearchParams(window.location.search);
    const lag = params.get("Name") || "";

    const baseFormURL =
        "https://forms.office.com/Pages/ResponsePage.aspx" +
        "?id=QMGcP7KB8Eywo2c8wWlZ-bGhOLBbrplKj5jcN7SVeUhUOFFZTzhXWTBPMEpINk5NOFZGSUc2VUs2VS4u" +
        "&embed=true";

    const finalURL =
        baseFormURL +
        "&rfea9ab1403bc4d0489621ff751363c36=" +
        encodeURIComponent(lag);

    document.getElementById("ms-form").src = finalURL;
    document.getElementById("form-container").style.display = "block";

    document.getElementById("captcha-container").style.display = "none";
}
</script>

</body>
</html>
