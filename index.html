<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
        }

        .button {
            padding: 12px 22px;
            background-color: #0078d4;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        #captcha-container {
            margin-top: 20px;
            display: none;
        }

        #iframe-container {
            margin-top: 30px;
            display: none;
        }
    </style>
</head>
<body>

<h2>Expression of Interest – Verification</h2>

<p>
    Before accessing the Expression of Interest form, please verify that you are human.
</p>

<button class="button" onclick="showCaptcha()">Continue</button>

<div id="captcha-container"></div>

<div id="iframe-container">
    <iframe
        id="form-iframe"
        width="640px"
        height="480px"
        frameborder="0"
        marginwidth="0"
        marginheight="0"
        style="border: none; max-width:100%; max-height:100vh"
        allowfullscreen
        webkitallowfullscreen
        mozallowfullscreen
        msallowfullscreen>
    </iframe>
</div>

<script>
function showCaptcha() {
    document.getElementById("captcha-container").style.display = "block";

    turnstile.render("#captcha-container", {
        sitekey: "0x4AAAAAACyjYuS7nzfVfYYa",
        callback: onCaptchaPassed
    });
}

function onCaptchaPassed(token) {
    const params = new URLSearchParams(window.location.search);
    const name = params.get("Name") || "";

    const iframeSrc =
        "https://forms.office.com/Pages/ResponsePage.aspx" +
        "?id=QMGcP7KB8Eywo2c8wWlZ-bGhOLBbrplKj5jcN7SVeUhUOFFZTzhXWTBPMEpINk5NOFZGSUc2VUs2VS4u" +
        "&embed=true" +
        "&rfea9ab1403bc4d0489621ff751363c36=" +
        encodeURIComponent(name);

    const iframe = document.getElementById("form-iframe");
    iframe.src = iframeSrc;

    document.getElementById("iframe-container").style.display = "block";
    document.getElementById("captcha-container").style.display = "none";
}
</script>

</body>
</html>
